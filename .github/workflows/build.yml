name: Android CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install Android 37 SDK
        run: |
          sdkmanager "platforms;android-37.0"
          sdkmanager "build-tools;37.0.0"
          ln -sf android-37.0 "$ANDROID_SDK_ROOT/platforms/android-37"
          echo "=== Installed platforms ==="
          ls -la $ANDROID_SDK_ROOT/platforms/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore (release only)
        if: ${{ github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/') }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/keystore.jks

      - name: Build with Gradle
        run: |
          # Use the system Gradle from setup-gradle action (not the broken wrapper jar)
          gradle wrapper --gradle-version 9.4.1
          chmod +x gradlew
          if [ "${{ github.event.inputs.build_type }}" = "release" ] || [[ "${{ github.ref }}" == refs/tags/* ]]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi

      - name: Sign APK (release)
        if: ${{ github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/') }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ${ANDROID_SDK_ROOT}/build-tools/37.0.0/zipalign -v 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            NewTieba-${{ github.ref_name }}_aligned.apk
          ${ANDROID_SDK_ROOT}/build-tools/37.0.0/apksigner sign \
            --ks app/keystore.jks \
            --ks-pass env:KEYSTORE_PASSWORD \
            --ks-key-alias $KEY_ALIAS \
            --key-pass env:KEY_PASSWORD \
            --out NewTieba-${{ github.ref_name }}.apk \
            NewTieba-${{ github.ref_name }}_aligned.apk
          rm NewTieba-${{ github.ref_name }}_aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NewTieba-${{ github.event.inputs.build_type || 'debug' }}
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
            *.apk
          if-no-files-found: warn

      - name: Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: NewTieba-*.apk
